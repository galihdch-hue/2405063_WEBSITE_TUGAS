name: Deploy Website CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add Host
        run: |
          ssh-keyscan -p 8022 103.174.237.194 >> ~/.ssh/known_hosts

      - name: Test Connection
        run: |
          ssh -i ~/.ssh/id_rsa -p 8022 \
          polindra123@103.174.237.194 \
          "echo KONEK"

      - name: Deploy
        run: |
          rsync -avz --delete \
          -e "ssh -i ~/.ssh/id_rsa -p 8022" \
          ./ \
          polindra123@103.174.237.194:/var/www/html/NIM_WEBSITE_TUGAS